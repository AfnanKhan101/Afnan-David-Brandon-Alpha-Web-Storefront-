<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Big Chungus Bakery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
 
  <!-- Bootstrap CDN (required) -->
<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
>
 
  <!-- Internal CSS (Storefront Styles + Validation Styling) -->
<style>
    :root {
      --bg: #fffaf3;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #9a3412;
      --line: rgba(31,41,55,.12);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 18px;
      --max-width: 1100px;
    }
 
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(234,88,12,.18), transparent 55%),
        var(--bg);
    }
 
    header, nav, main, footer {
      max-width: var(--max-width);
      margin: auto;
      padding: 16px;
    }
 
    .banner {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 18px;
      padding: 18px;
      background: rgba(255,255,255,.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
 
    .primary-nav ul {
      list-style: none;
      display: flex;
      gap: 10px;
      padding: 10px;
      background: rgba(255,255,255,.65);
      border-radius: var(--radius);
    }
 
    .primary-nav a {
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text);
    }
 
    .primary-nav a:hover {
      background: rgba(234,88,12,.12);
    }
 
    .content-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }
 
    .card {
      background: rgba(255,255,255,.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
 
    footer {
      text-align: center;
      color: var(--muted);
    }
 
    @media (max-width: 820px) {
      .banner, .content-layout {
        grid-template-columns: 1fr;
      }
    }
 
    /* JS validation visuals (red) */
    .field-error {
      border: 2px solid #FF0000 !important;
      color: #FF0000 !important;
    }
 
    .error-text {
      display: block;
      min-height: 18px; /* keeps layout from jumping */
      margin-top: 6px;
      color: #FF0000;
      font-size: 0.9rem;
    }
</style>
</head>
 
<body>
 
<header>
<section class="banner">
<img src="https://placehold.co/140x140?text=BCB" alt="Logo" style="border-radius:50%;">
<div>
<h1>Big Chungus Bakery</h1>
<p style="max-width:60ch;">Fresh baked goods made daily.</p>
</div>
</section>
</header>
 
<nav class="primary-nav">
<ul>
<li><a href="#store">Storefront</a></li>
<li><a href="#signup">Sign Up</a></li>
</ul>
</nav>
 
<main id="store" class="content-layout">
<section class="card">
<h2>Today’s Deals</h2>
<p><strong>Chocolate Croissant</strong> — $3.25</p>
<p><strong>Cinnamon Roll</strong> — $4.50</p>
</section>
 
  <aside class="card">
<h2>Pickup Reminder</h2>
<p>Order early for weekends.</p>
</aside>
</main>
 
<!-- Sign-Up Section -->
<main id="signup" class="mt-5">
<section class="card mx-auto" style="max-width:560px;">
<h2 class="mb-3">User Sign Up</h2>
 
    <!-- novalidate prevents browser HTML5 validation popups -->
<form id="signupForm" novalidate>
 
      <div class="mb-3">
<label class="form-label" for="username">Username</label>
<input
          type="text"
          class="form-control"
          id="username"
          placeholder="Enter username"
          onfocusout="validate(this)"
>
<span class="error-text" id="usernameError"></span>
</div>
 
      <div class="mb-3">
<label class="form-label" for="email">Email</label>
<input
          type="text"
          class="form-control"
          id="email"
          placeholder="joe@test.com"
          onfocusout="validate(this)"
>
<span class="error-text" id="emailError"></span>
</div>
 
      <div class="mb-3">
<label class="form-label" for="password">Password</label>
<input
          type="password"
          class="form-control"
          id="password"
          placeholder="Enter password"
          onfocusout="validate(this)"
>
<span class="error-text" id="passwordError"></span>
</div>
 
      <div class="mb-3">
<label class="form-label" for="confirmPassword">Confirm Password</label>
<input
          type="password"
          class="form-control"
          id="confirmPassword"
          placeholder="Re-enter password"
          onfocusout="validate(this)"
>
<span class="error-text" id="confirmPasswordError"></span>
</div>
 
      <button class="btn btn-primary w-100" type="submit">Create Account</button>
</form>
</section>
</main>
 
<footer>
<p>© 2026 Big Chungus Bakery</p>
</footer>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 
<!-- Internal JavaScript Validation -->
<script>
  // Email format example: joe@test.com
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
 
  function setError(input, message) {
    input.classList.add("field-error");
    document.getElementById(input.id + "Error").textContent = message;
  }
 
  function clearError(input) {
    input.classList.remove("field-error");
    document.getElementById(input.id + "Error").textContent = "";
  }
 
  function validate(input) {
    const value = input.value.trim();
 
    // 1) Required check (all fields)
    if (value === "") {
      setError(input, "This field is required.");
      return false;
    }
 
    // 2) Email format check
    if (input.id === "email") {
      if (!emailPattern.test(value)) {
        setError(input, "Invalid email format (example: joe@test.com).");
        return false;
      }
      clearError(input);
      return true;
    }
 
    // 3) Password checks (required already handled)
    if (input.id === "password") {
      clearError(input);
 
      // If confirmPassword has something, re-check it so mismatch turns red/clears live
      const cp = document.getElementById("confirmPassword");
      if (cp.value.trim() !== "") validate(cp);
 
      return true;
    }
 
    // 4) Confirm password must match password
    if (input.id === "confirmPassword") {
      const password = document.getElementById("password").value;
      if (value !== password) {
        setError(input, "Passwords do not match.");
        return false;
      }
      clearError(input);
      return true;
    }
 
    // 5) Username (just required for this assignment)
    clearError(input);
    return true;
  }
 
  // Validate the whole form on submit (so nothing is missed)
  document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();
 
    const ids = ["username", "email", "password", "confirmPassword"];
    let allValid = true;
 
    for (const id of ids) {
      const el = document.getElementById(id);
      if (!validate(el)) allValid = false;
    }
 
    if (allValid) {
      alert("Form submitted successfully (demo).");
      // Optional: clear form after success
      // this.reset();
    }
  });
</script>
 
</body>
</html>
