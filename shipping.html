<script>
  /* Team Task Author: David Baram - Task 4 JavaScript */
  function validateShippingForm() {
    let isValid = true;

    document.getElementById("addressError").textContent = "";
    document.getElementById("cityError").textContent = "";
    document.getElementById("stateError").textContent = "";
    document.getElementById("zipError").textContent = "";
    document.getElementById("carrierError").textContent = "";
    document.getElementById("methodError").textContent = "";

    const address = $("#address").val().trim();
    const city = $("#city").val().trim();
    const state = $("#state").val().trim();
    const zip = $("#zip").val().trim();
    const carrier = $("#carrier").val();
    const method = $("#method").val();

    if (address === "") {
      $("#addressError").text("Required");
      isValid = false;
    }
    if (city === "") {
      $("#cityError").text("Required");
      isValid = false;
    }
    if (state.length !== 2) {
      $("#stateError").text("2 letters");
      isValid = false;
    }
    if (!/^\d{5}$/.test(zip)) {
      $("#zipError").text("5 digits");
      isValid = false;
    }
    if (carrier === "") {
      $("#carrierError").text("Required");
      isValid = false;
    }
    if (method === "") {
      $("#methodError").text("Required");
      isValid = false;
    }

    return isValid;
  }

  /* Team Task Author: David Baram - Task 5 JSON */
  /* Team Task Author: David Baram - Task 6 jQuery */
  $("#saveShippingBtn").on("click", function () {

    if (!validateShippingForm()) return;

    const shippingDetails = {
      address: $("#address").val().trim(),
      city: $("#city").val().trim(),
      state: $("#state").val().trim().toUpperCase(),
      zip: $("#zip").val().trim(),
      carrier: $("#carrier").val(),
      method: $("#method").val()
    };

    // SAVE LOCAL
    localStorage.setItem("shippingDetails", JSON.stringify(shippingDetails));

    // UPDATE ANGULAR VIEW
    const scope = angular.element(document.body).scope();
    scope.$apply(function () {
      scope.shippingJson = shippingDetails;
    });

    // 🔥 SEND TO NODE SERVER (NEW PART)
    $.ajax({
      url: "http://130.203.136.203:3005/shipping",   // ✅ TEAM 5 PORT
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify(shippingDetails),
      success: function(res) {
        console.log("Shipping sent:", res);
        alert("Saved + Sent to server ✅");
      },
      error: function() {
        alert("Error sending to server ❌");
      }
    });
  });

  /* Team Task Author: Brandon Holzhauer - Task 8 AngularJS */
  const app = angular.module("shippingApp", []);

  app.controller("ShippingController", function($scope) {
    $scope.shipping = {
      address: "",
      city: "",
      state: "",
      zip: "",
      carrier: "",
      method: ""
    };

    $scope.shippingJson = {};

    const saved = JSON.parse(localStorage.getItem("shippingDetails"));
    if (saved) {
      $scope.shipping = saved;
      $scope.shippingJson = saved;
    }
  });
</script>
