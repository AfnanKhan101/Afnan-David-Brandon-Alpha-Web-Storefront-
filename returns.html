<!doctype html>
<html lang="en" ng-app="returnsApp">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Handle Returns</title>

<!-- Afnan Khan - Task 1 HTML -->
<!-- Afnan Khan - Task 2 CSS -->
<!-- Afnan Khan - Task 3 Bootstrap -->
<!-- David Baram - Task 4 JavaScript -->
<!-- David Baram - Task 5 JSON -->
<!-- David Baram - Task 6 jQuery -->

<!-- Brandon Holzhauer - Task 9 NodeJS -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>
body { background:#fffaf3; font-family:Arial; }
.card-box { background:#fff; padding:20px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,.1);}
.json-box { background:#111; color:#fff; padding:15px; border-radius:10px; min-height:220px; }
</style>
</head>

<body ng-controller="ReturnController">

<nav class="p-3">
<a href="index.html">Storefront</a> |
<a href="product.html">Products</a> |
<a href="shoppingcart.html">Cart</a> |
<a href="shipping.html">Shipping</a> |
<a href="billings.html">Billing</a> |
<a href="returns.html">Returns</a>
</nav>

<main class="container">

<div class="row">
  <div class="col-md-8">
    <div class="card-box mb-3">
      <h2>Handle Returns</h2>

      <input id="search" class="form-control mb-2" placeholder="Search product">
      <button id="addReturn" class="btn btn-warning">Add Return</button>
      <button id="submitReturn" class="btn btn-success">Submit Return</button>

      <ul id="returnList" class="mt-3"></ul>

      <p id="returnMsg" class="mt-2"></p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card-box">
      <h3>Return JSON</h3>
      <pre id="returnJSON" class="json-box"></pre>
    </div>
  </div>
</div>

</main>

<script>
/* David Baram - Task 4 JavaScript */
let returnItems = [];

/* David Baram - Task 5 JSON */
function buildReturnJSON() {
  return {
    returnCollection: returnItems
  };
}

/* David Baram - Task 6 jQuery */
$("#addReturn").click(function() {
  let item = $("#search").val().trim();

  if (item === "") {
    $("#returnMsg").text("Enter a product first.");
    return;
  }

  returnItems.push({ product: item });
  $("#returnList").append(`<li>${item}</li>`);
  $("#returnJSON").text(JSON.stringify(buildReturnJSON(), null, 2));
  $("#returnMsg").text("Return item added.");
  $("#search").val("");
});

/* Brandon Holzhauer - Task 7 AJAX */
$("#submitReturn").click(function() {
  let data = buildReturnJSON();

  if (returnItems.length === 0) {
    $("#returnMsg").text("Add at least one return item first.");
    return;
  }

  $("#returnJSON").text(JSON.stringify(data, null, 2));

  $.ajax({
    url: "http://localhost:3005/returns",
    type: "POST",
    data: JSON.stringify(data),
    contentType: "application/json",
    success: function(response) {
      console.log("Return sent to server:", response);
      $("#returnMsg").text("Return sent successfully to Node server.");
    },
    error: function() {
      $("#returnMsg").text("Error sending return to Node server.");
    }
  });
});

/* Brandon Holzhauer - Task 8 AngularJS */
const app = angular.module("returnsApp", []);
app.controller("ReturnController", function($scope) {});

/* Brandon Holzhauer - Task 9 NodeJS */
/* Node route target: /returns on Team 5 port 3005 */
</script>

</body>
</html>
