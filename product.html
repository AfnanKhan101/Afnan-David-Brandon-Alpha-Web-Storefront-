<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Big Chungus Bakery | Product Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Team Task Author: Khan, Afnan Ali - Task 1 HTML -->
<!-- Team Task Author: Khan, Afnan Ali - Task 2 CSS -->
<!-- Team Task Author: Khan, Afnan Ali - Task 3 Bootstrap -->
<!-- Team Task Author: David Baram - Task 4 JavaScript -->
<!-- Team Task Author: David Baram - Task 5 JSON -->
<!-- Team Task Author: Brandon Holzhauer - Task 6 jQuery -->
<!-- Team Task Author: Brandon Holzhauer - Task 7 Product Details -->

<!-- Bootstrap (REQUIRED in head) -->
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  rel="stylesheet"
>

<!-- jQuery (REQUIRED in head) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
:root {
  --bg: #fffaf3;
  --text: #1f2937;
  --muted: #6b7280;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 18px;
  --max-width: 1100px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(234,88,12,.18), transparent 55%),
    var(--bg);
}

header, nav, main, footer {
  max-width: var(--max-width);
  margin: auto;
  padding: 16px;
}

.banner {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 18px;
  padding: 18px;
  background: rgba(255,255,255,.7);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.primary-nav ul {
  list-style: none;
  display: flex;
  gap: 10px;
  padding: 10px;
  margin: 0;
  background: rgba(255,255,255,.65);
  border-radius: var(--radius);
}

.primary-nav a {
  padding: 10px 12px;
  border-radius: 999px;
  font-weight: 600;
  text-decoration: none;
  color: var(--text);
}

.primary-nav a:hover {
  background: rgba(234,88,12,.12);
}

.card {
  background: rgba(255,255,255,.85);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
}

.error-text {
  color: red;
  font-size: 0.9rem;
  display: block;
  min-height: 20px;
  margin-top: 4px;
}

.field-error {
  border: 2px solid red !important;
}

.json-output {
  background: #111827;
  color: #f9fafb;
  padding: 16px;
  border-radius: 12px;
  min-height: 180px;
  white-space: pre-wrap;
}

footer {
  text-align: center;
  color: var(--muted);
}
</style>
</head>

<body>

<header>
<section class="banner">
<img src="https://placehold.co/140x140?text=BCB" alt="Logo" style="border-radius:50%;">
<div>
<h1>Big Chungus Bakery</h1>
<p>Product Management Web Page</p>
</div>
</section>
</header>

<nav class="primary-nav">
<ul>
<li><a href="index.html">Storefront</a></li>
<li><a href="#productFormSection">Product Form</a></li>
<li><a href="#searchSection">Search Product</a></li>
<li><a href="#jsonSection">JSON Output</a></li>
</ul>
</nav>

<main id="productFormSection">
<section class="card mx-auto" style="max-width:700px;">
<h2>Product Management</h2>

<form id="productForm" novalidate>

<div class="mb-3">
<label for="productId" class="form-label">Product Id *</label>
<input type="text" class="form-control" id="productId" onfocusout="validateField(this)">
<span class="error-text" id="productIdError"></span>
</div>

<div class="mb-3">
<label for="productDescription" class="form-label">Product Description *</label>
<textarea class="form-control" id="productDescription" onfocusout="validateField(this)"></textarea>
<span class="error-text" id="productDescriptionError"></span>
</div>

<div class="mb-3">
<label for="productCategory" class="form-label">Product Category *</label>
<select class="form-select" id="productCategory" onfocusout="validateField(this)">
<option value="">Select Category</option>
<option>Bread</option>
<option>Pastry</option>
<option>Cake</option>
<option>Cookie</option>
<option>Drink</option>
</select>
<span class="error-text" id="productCategoryError"></span>
</div>

<div class="mb-3">
<label for="productUOM" class="form-label">Product Unit of Measure *</label>
<select class="form-select" id="productUOM" onfocusout="validateField(this)">
<option value="">Select Unit</option>
<option>Each</option>
<option>Dozen</option>
<option>Box</option>
<option>Pound</option>
</select>
<span class="error-text" id="productUOMError"></span>
</div>

<div class="mb-3">
<label for="productPrice" class="form-label">Product Price *</label>
<input type="text" class="form-control" id="productPrice" placeholder="3.25" onfocusout="validateField(this)">
<span class="error-text" id="productPriceError"></span>
</div>

<div class="mb-3">
<label for="productWeight" class="form-label">Product Weight (Optional)</label>
<input type="text" class="form-control" id="productWeight" onfocusout="validateField(this)">
<span class="error-text" id="productWeightError"></span>
</div>

<button type="submit" class="btn btn-primary w-100">Submit</button>
</form>
</section>
</main>

<main id="searchSection">
<section class="card mx-auto mt-4" style="max-width:700px;">
<h2>Search Product</h2>

<div class="mb-3">
<label for="searchProductId" class="form-label">Product ID</label>
<input type="text" class="form-control" id="searchProductId" name="searchProductId">
</div>

<button type="button" id="searchBtn" class="btn btn-primary">Search</button>
<button type="button" id="updateBtn" class="btn btn-success ms-2">Update Loaded Product</button>

<p id="searchMessage" class="mt-3 mb-0"></p>
</section>
</main>

<main id="jsonSection">
<section class="card mx-auto mt-4" style="max-width:700px;">
<h2>JSON Product Document</h2>
<pre id="jsonOutput" class="json-output">[]</pre>
</section>
</main>

<footer>
<p>© 2026 Big Chungus Bakery</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* Team Task Author: David Baram - Task 4 JavaScript */
/* Team Task Author: David Baram - Task 5 JSON */

let products = [];

function setError(input, message) {
  input.classList.add("field-error");
  document.getElementById(input.id + "Error").textContent = message;
}

function clearError(input) {
  input.classList.remove("field-error");
  document.getElementById(input.id + "Error").textContent = "";
}

function validateField(input) {
  const value = input.value.trim();

  if (input.id === "productWeight") {
    clearError(input);
    return true;
  }

  if (value === "") {
    setError(input, "Required");
    return false;
  }

  if (input.id === "productPrice") {
    const price = parseFloat(value);
    if (isNaN(price)) {
      setError(input, "Invalid price");
      return false;
    }
    input.value = price.toFixed(2);
  }

  clearError(input);
  return true;
}

function renderJSON() {
  document.getElementById("jsonOutput").textContent =
    JSON.stringify(products, null, 2);
}

document.getElementById("productForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const ids = [
    "productId",
    "productDescription",
    "productCategory",
    "productUOM",
    "productPrice",
    "productWeight"
  ];

  let valid = true;

  ids.forEach(id => {
    if (!validateField(document.getElementById(id))) valid = false;
  });

  if (!valid) return;

  const productData = {
    productId: productId.value.trim(),
    productDesc: productDescription.value.trim(),
    productCategory: productCategory.value,
    productUOM: productUOM.value,
    productPrice: parseFloat(productPrice.value),
    productWeight: productWeight.value.trim() || null
  };

  const existingIndex = products.findIndex(product => product.productId === productData.productId);

  if (existingIndex !== -1) {
    products[existingIndex] = productData;
  } else {
    products.push(productData);
  }

  renderJSON();
});

/* Team Task Author: Brandon Holzhauer - Task 6 jQuery */
/* Team Task Author: Brandon Holzhauer - Task 7 Product Details */

$("#searchBtn").on("click", function() {
  const id = $("#searchProductId").val().trim();

  if (id === "") {
    $("#searchMessage").text("Enter a Product ID.");
    return;
  }

  const found = products.find(product => product.productId === id);

  if (found) {
    $("#productId").val(found.productId);
    $("#productDescription").val(found.productDesc);
    $("#productCategory").val(found.productCategory);
    $("#productUOM").val(found.productUOM);
    $("#productPrice").val(found.productPrice.toFixed(2));
    $("#productWeight").val(found.productWeight || "");
    $("#searchMessage").text("Product loaded into form.");
  } else {
    $("#searchMessage").text("Product not found.");
  }
});

$("#updateBtn").on("click", function() {
  const id = $("#productId").val().trim();

  if (id === "") {
    $("#searchMessage").text("Load a product first.");
    return;
  }

  const index = products.findIndex(product => product.productId === id);

  if (index === -1) {
    $("#searchMessage").text("Search for an existing product first.");
    return;
  }

  if (
    !validateField(document.getElementById("productId")) ||
    !validateField(document.getElementById("productDescription")) ||
    !validateField(document.getElementById("productCategory")) ||
    !validateField(document.getElementById("productUOM")) ||
    !validateField(document.getElementById("productPrice")) ||
    !validateField(document.getElementById("productWeight"))
  ) {
    $("#searchMessage").text("Fix form errors before updating.");
    return;
  }

  const updatedProduct = {
    productId: $("#productId").val().trim(),
    productDesc: $("#productDescription").val().trim(),
    productCategory: $("#productCategory").val(),
    productUOM: $("#productUOM").val(),
    productPrice: parseFloat($("#productPrice").val()),
    productWeight: $("#productWeight").val().trim() || null
  };

  products[index] = updatedProduct;
  renderJSON();
  $("#searchMessage").text("Product updated successfully.");
});
</script>

</body>
</html>
