<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Big Chungus Bakery | Product Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Team Task Author: Afnan Khan - Bootstrap integration -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    /* Team Task Author: Afnan Khan - HTML page structure, CSS styling, and Bootstrap page cosmetics */

    :root {
      --bg: #fffaf3;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #9a3412;
      --line: rgba(31, 41, 55, 0.12);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --max-width: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      color: var(--text);
      background: #f5f5f5;
    }

    header, nav, main, footer {
      max-width: var(--max-width);
      margin: auto;
      padding: 16px;
    }

    .banner {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 18px;
      padding: 18px;
      background: rgba(255,255,255,.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: 18px;
    }

    .primary-nav ul {
      list-style: none;
      display: flex;
      gap: 10px;
      padding: 10px;
      background: rgba(255,255,255,.65);
      border-radius: var(--radius);
      margin: 0;
    }

    .primary-nav a {
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text);
    }

    .primary-nav a:hover {
      background: rgba(234,88,12,.12);
    }

    .card-box {
      background: rgba(255,255,255,.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .section-title {
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 18px;
    }

    .json-placeholder {
      background: #111827;
      color: white;
      padding: 16px;
      border-radius: 12px;
      min-height: 150px;
      white-space: pre-wrap;
    }

    .search-area,
    .details-area {
      margin-top: 24px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      padding-bottom: 30px;
    }
  </style>
</head>
<body>

  <!-- Team Task Author: Afnan Khan - HTML page structure -->
  <header>
    <section class="banner">
      <img src="https://placehold.co/140x140?text=BCB" alt="Logo" class="img-fluid rounded-circle">
      <div>
        <h1 class="mb-2">Big Chungus Bakery</h1>
        <p class="mb-0">Product Management Page</p>
      </div>
    </section>
  </header>

  <nav class="primary-nav">
    <ul>
      <li><a href="index.html">Storefront</a></li>
      <li><a href="index.html#shopper">Shopper Management</a></li>
      <li><a href="product.html">Product Management</a></li>
    </ul>
  </nav>

  <main>
    <section class="card-box mx-auto" style="max-width: 720px;">
      <h2 class="section-title">Product Management</h2>

      <form id="productForm">
        <div class="mb-3">
          <label for="productId" class="form-label">Product ID *</label>
          <input type="text" class="form-control" id="productId" name="productId">
        </div>

        <div class="mb-3">
          <label for="productDescription" class="form-label">Product Description *</label>
          <input type="text" class="form-control" id="productDescription" name="productDescription">
        </div>

        <div class="mb-3">
          <label for="productCategory" class="form-label">Product Category *</label>
          <select class="form-select" id="productCategory" name="productCategory">
            <option value="">Select Category</option>
            <option>Bakery</option>
            <option>Bread</option>
            <option>Pastry</option>
            <option>Cake</option>
            <option>Cookie</option>
            <option>Drink</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="productUOM" class="form-label">Product Unit of Measure *</label>
          <select class="form-select" id="productUOM" name="productUOM">
            <option value="">Select Unit</option>
            <option>Each</option>
            <option>Box</option>
            <option>Pack</option>
            <option>Dozen</option>
            <option>Pound</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="productPrice" class="form-label">Product Price *</label>
          <input type="text" class="form-control" id="productPrice" name="productPrice" placeholder="0.00">
        </div>

        <div class="mb-3">
          <label for="productWeight" class="form-label">Product Weight (Optional)</label>
          <input type="text" class="form-control" id="productWeight" name="productWeight">
        </div>

        <button type="submit" class="btn btn-primary w-100">Save</button>
      </form>

      <div class="search-area">
        <h3 class="section-title">Search Product</h3>
        <div class="mb-3">
          <label for="searchProductId" class="form-label">Product ID</label>
          <input type="text" class="form-control" id="searchProductId" name="searchProductId">
        </div>
        <button type="button" class="btn btn-outline-secondary">Search</button>
      </div>

      <div class="details-area">
        <h3 class="section-title">Product Details</h3>
        <h4 class="mb-3">JSON</h4>
        <pre class="json-placeholder" id="jsonOutput">No product data yet</pre>
        <button type="button" class="btn btn-success w-100 mt-3">Update</button>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Big Chungus Bakery</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
