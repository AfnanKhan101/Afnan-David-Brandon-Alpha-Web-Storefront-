<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>
body { background:#fffaf3; font-family:Arial; }
.card-box { background:#fff; padding:20px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,.1);}
.json-box { background:#111; color:#fff; padding:15px; border-radius:10px;}
</style>
</head>

<body ng-controller="BillingController">

<nav class="p-3">
<a href="index.html">Storefront</a> |
<a href="product.html">Products</a> |
<a href="shoppingcart.html">Cart</a> |
<a href="shipping.html">Shipping</a> |
<a href="returns.html">Returns</a>
</nav>

<main class="container">

<div class="row">
<div class="col-md-8">

<div class="card-box mb-3">
<h2>Billing Details</h2>

<input id="name" class="form-control mb-2" placeholder="Full Name">
<input id="card" class="form-control mb-2" placeholder="Card Number">
<input id="zip" class="form-control mb-2" placeholder="ZIP">

<button id="submitBilling" class="btn btn-primary">Submit Billing</button>

<p id="msg" class="mt-2"></p>

</div>

</div>

<div class="col-md-4">
<div class="card-box">
<h3>Billing JSON</h3>
<pre id="billingJSON" class="json-box"></pre>
</div>
</div>

</div>

</main>

<script>
/* David Baram - Task 4 JavaScript */
function validateBilling(data){
  if(data.name==="" || data.card==="") return false;
  return true;
}

/* David Baram - Task 5 JSON */
function buildBillingJSON(){
  return {
    name: $("#name").val(),
    card: $("#card").val(),
    zip: $("#zip").val()
  };
}

/* David Baram - Task 6 jQuery */
$("#submitBilling").click(function(){
  let data = buildBillingJSON();

  if(!validateBilling(data)){
    $("#msg").text("Fill required fields");
    return;
  }

  $("#billingJSON").text(JSON.stringify(data,null,2));
  $("#msg").text("Billing JSON Generated");

  sendBilling(data);
});

/* Brandon Holzhauer - Task 7 AJAX */
function sendBilling(data){
  $.ajax({
    url:"https://jsonplaceholder.typicode.com/posts",
    type:"POST",
    data:JSON.stringify(data),
    contentType:"application/json",
    success:function(){
      $("#msg").text("Sent to API");
    }
  });
}

/* Brandon Holzhauer - Task 8 AngularJS */
const app = angular.module("billingApp",[]);
app.controller("BillingController", function($scope){});

/* Brandon Holzhauer - Task 9 NodeJS */
/* (Placeholder: will connect to Node server in next assignment) */

</script>

</body>
</html>
