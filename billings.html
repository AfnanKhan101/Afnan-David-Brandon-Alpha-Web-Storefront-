<!doctype html>
<html lang="en" ng-app="billingApp">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Big Chungus Bakery | Billing Details</title>

<!-- Afnan Khan - Task 1 HTML -->
<!-- Afnan Khan - Task 2 CSS -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>
body { background:#fffaf3; font-family:Arial; }
.card-box { background:#fff; padding:20px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,.1);}
.json-box { background:#111; color:#fff; padding:15px; border-radius:10px; min-height:220px; }
</style>
</head>

<body ng-controller="BillingController">

<nav class="p-3">
<a href="index.html">Storefront</a> |
<a href="product.html">Products</a> |
<a href="shoppingcart.html">Cart</a> |
<a href="shipping.html">Shipping</a> |
<a href="billings.html">Billing</a> |
<a href="returns.html">Returns</a>
</nav>

<main class="container">

<div class="row">
  <div class="col-md-8">
    <div class="card-box mb-3">
      <h2>Billing Details</h2>

      <input id="name" class="form-control mb-2" placeholder="Full Name">
      <input id="card" class="form-control mb-2" placeholder="Card Number">
      <input id="zip" class="form-control mb-2" placeholder="ZIP">

      <button id="submitBilling" class="btn btn-primary">Submit Billing</button>

      <p id="msg" class="mt-2"></p>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card-box">
      <h3>Billing JSON</h3>
      <pre id="billingJSON" class="json-box"></pre>
    </div>
  </div>
</div>

</main>

<script>
/* David Baram - Task 4 JavaScript */
function validateBilling(data){
  if(data.name.trim() === "" || data.card.trim() === "" || data.zip.trim() === "") return false;
  return true;
}

/* David Baram - Task 5 JSON */
function buildBillingJSON(){
  return {
    name: $("#name").val().trim(),
    card: $("#card").val().trim(),
    zip: $("#zip").val().trim()
  };
}

/* David Baram - Task 6 jQuery */
$("#submitBilling").click(function(){
  let data = buildBillingJSON();

  if(!validateBilling(data)){
    $("#msg").text("Fill required fields");
    return;
  }

  $("#billingJSON").text(JSON.stringify(data, null, 2));
  $("#msg").text("Billing JSON generated");

  sendBilling(data);
});

/* Brandon Holzhauer - Task 7 AJAX */
function sendBilling(data){
  $.ajax({
    url: "http://localhost:3005/billing",
    type: "POST",
    data: JSON.stringify(data),
    contentType: "application/json",
    success: function(response){
      console.log("Billing sent to server:", response);
      $("#msg").text("Billing sent successfully to Node server.");
    },
    error: function(){
      $("#msg").text("Error sending billing to Node server.");
    }
  });
}

/* Brandon Holzhauer - Task 8 AngularJS */
const app = angular.module("billingApp", []);
app.controller("BillingController", function($scope){});

/* Brandon Holzhauer - Task 9 NodeJS */
/* Node route target: /billing on Team 5 port 3005 */

</script>

</body>
</html>
