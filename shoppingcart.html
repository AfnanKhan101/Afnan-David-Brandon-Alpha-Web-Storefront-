<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Big Chungus Bakery | Shopping Cart</title>

<!-- Team Task Author: Khan, Afnan Ali - Task 1 HTML -->
<!-- Team Task Author: Khan, Afnan Ali - Task 2 CSS -->
<!-- Team Task Author: Khan, Afnan Ali - Task 3 Bootstrap -->
<!-- Team Task Author: David Baram - Task 4 JavaScript -->
<!-- Team Task Author: David Baram - Task 5 JSON -->
<!-- Team Task Author: Brandon Holzhauer - Task 6 jQuery -->
<!-- Team Task Author: Brandon Holzhauer - Task 7 AJAX -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
:root {
  --bg: #fffaf3;
  --text: #1f2937;
  --muted: #6b7280;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 18px;
  --max-width: 1100px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  color: var(--text);
  background:
    radial-gradient(1200px 600px at 20% -10%, rgba(234,88,12,.18), transparent 55%),
    var(--bg);
}

header, nav, main, footer {
  max-width: var(--max-width);
  margin: auto;
  padding: 16px;
}

.banner {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 18px;
  padding: 18px;
  background: rgba(255,255,255,.75);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.primary-nav ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
  margin: 0;
  background: rgba(255,255,255,.7);
  border-radius: var(--radius);
}

.primary-nav a {
  padding: 10px 12px;
  border-radius: 999px;
  font-weight: 600;
  text-decoration: none;
  color: var(--text);
}

.primary-nav a:hover {
  background: rgba(234,88,12,.12);
}

.card-box {
  background: rgba(255,255,255,.9);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
}

.table input[type="number"] {
  max-width: 90px;
}

.json-output {
  background: #111827;
  color: #f9fafb;
  padding: 16px;
  border-radius: 12px;
  min-height: 220px;
  white-space: pre-wrap;
}

.status-box {
  min-height: 24px;
  font-weight: 600;
}

.total-text {
  font-size: 1.1rem;
  font-weight: 700;
}

footer {
  text-align: center;
  color: var(--muted);
}
</style>
</head>
<body>

<header>
  <section class="banner">
    <img src="https://placehold.co/140x140?text=BCB" alt="Logo" style="border-radius:50%;">
    <div>
      <h1>Big Chungus Bakery</h1>
      <p>Shopping Cart Web Page</p>
    </div>
  </section>
</header>

<nav class="primary-nav">
  <ul>
    <li><a href="index.html">Storefront</a></li>
    <li><a href="product.html">Product Management</a></li>
    <li><a href="shoppingcart.html">Shopping Cart</a></li>
  </ul>
</nav>

<main id="cartSection">
  <section class="card-box">
    <h2 class="mb-3">Shopping Cart</h2>

    <div class="row g-3 align-items-end">
      <div class="col-md-8">
        <label for="productSelect" class="form-label">Select Product</label>
        <select id="productSelect" class="form-select">
          <option value="">Choose a product</option>
        </select>
      </div>
      <div class="col-md-2">
        <label for="addQty" class="form-label">Qty</label>
        <input type="number" id="addQty" class="form-control" min="1" value="1">
      </div>
      <div class="col-md-2 d-grid">
        <button type="button" id="addBtn" class="btn btn-primary">Add</button>
      </div>
    </div>

    <div class="table-responsive mt-4">
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cartTableBody">
          <tr>
            <td colspan="6" class="text-center text-muted">Cart is empty.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="d-flex justify-content-end">
      <div class="total-text">Cart Total: $<span id="cartGrandTotal">0.00</span></div>
    </div>

    <div class="d-flex gap-2 flex-wrap mt-3">
      <button type="button" id="checkoutBtn" class="btn btn-success">Checkout</button>
      <button type="button" id="clearBtn" class="btn btn-outline-danger">Clear Cart</button>
    </div>

    <p id="cartMessage" class="status-box mt-3 mb-0"></p>
  </section>
</main>

<main id="jsonSection">
  <section class="card-box mt-4">
    <h2>Shopping Cart JSON Document</h2>
    <pre id="jsonOutput" class="json-output">[]</pre>
  </section>
</main>

<footer>
  <p>© 2026 Big Chungus Bakery</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* Team Task Author: David Baram - Task 4 JavaScript */
/* Team Task Author: David Baram - Task 5 JSON */

const productCatalog = [
  { productId: "001", productName: "Chocolate Cake", price: 24.99 },
  { productId: "002", productName: "Cinnamon Roll", price: 4.50 },
  { productId: "003", productName: "Chocolate Croissant", price: 3.25 },
  { productId: "004", productName: "Blueberry Muffin", price: 3.99 },
  { productId: "005", productName: "Coffee", price: 2.99 }
];

let cart = [];

function loadProducts() {
  const productSelect = document.getElementById("productSelect");
  productCatalog.forEach(product => {
    const option = document.createElement("option");
    option.value = product.productId;
    option.textContent = `${product.productId} - ${product.productName} ($${product.price.toFixed(2)})`;
    productSelect.appendChild(option);
  });
}

function renderCart() {
  const cartTableBody = document.getElementById("cartTableBody");
  const jsonOutput = document.getElementById("jsonOutput");
  const cartGrandTotal = document.getElementById("cartGrandTotal");

  if (cart.length === 0) {
    cartTableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">Cart is empty.</td></tr>';
    cartGrandTotal.textContent = "0.00";
    jsonOutput.textContent = JSON.stringify([], null, 2);
    return;
  }

  let html = "";
  let grandTotal = 0;

  cart.forEach(item => {
    item.total = item.price * item.quantity;
    grandTotal += item.total;

    html += `
      <tr>
        <td>${item.productId}</td>
        <td>${item.productName}</td>
        <td>$${item.price.toFixed(2)}</td>
        <td>
          <input
            type="number"
            class="form-control quantity-input"
            min="1"
            value="${item.quantity}"
            data-id="${item.productId}"
          >
        </td>
        <td>$${item.total.toFixed(2)}</td>
        <td>
          <button type="button" class="btn btn-danger btn-sm remove-btn" data-id="${item.productId}">Remove</button>
        </td>
      </tr>
    `;
  });

  cartTableBody.innerHTML = html;
  cartGrandTotal.textContent = grandTotal.toFixed(2);
  jsonOutput.textContent = JSON.stringify(cart, null, 2);
}

function addToCart() {
  const selectedId = document.getElementById("productSelect").value;
  const qty = parseInt(document.getElementById("addQty").value, 10);
  const cartMessage = document.getElementById("cartMessage");

  if (selectedId === "") {
    cartMessage.textContent = "Please choose a product.";
    return;
  }

  if (isNaN(qty) || qty < 1) {
    cartMessage.textContent = "Quantity must be at least 1.";
    return;
  }

  const selectedProduct = productCatalog.find(product => product.productId === selectedId);
  const existingItem = cart.find(item => item.productId === selectedId);

  if (existingItem) {
    existingItem.quantity += qty;
  } else {
    cart.push({
      productId: selectedProduct.productId,
      productName: selectedProduct.productName,
      price: selectedProduct.price,
      quantity: qty,
      total: selectedProduct.price * qty
    });
  }

  cartMessage.textContent = "Product added to cart.";
  renderCart();
}

function updateQuantity(productId, quantity) {
  const item = cart.find(product => product.productId === productId);

  if (!item) return;

  if (isNaN(quantity) || quantity < 1) {
    quantity = 1;
  }

  item.quantity = quantity;
  renderCart();
}

function removeFromCart(productId) {
  cart = cart.filter(item => item.productId !== productId);
  document.getElementById("cartMessage").textContent = "Product removed from cart.";
  renderCart();
}

function clearCart() {
  cart = [];
  document.getElementById("cartMessage").textContent = "Cart cleared.";
  renderCart();
}

/* Team Task Author: Brandon Holzhauer - Task 6 jQuery */
$(document).on("click", "#addBtn", function() {
  addToCart();
});

$(document).on("input", ".quantity-input", function() {
  const productId = $(this).data("id");
  const quantity = parseInt($(this).val(), 10);
  updateQuantity(productId, quantity);
});

$(document).on("click", ".remove-btn", function() {
  const productId = $(this).data("id");
  removeFromCart(productId);
});

$(document).on("click", "#clearBtn", function() {
  clearCart();
});

/* Team Task Author: Brandon Holzhauer - Task 7 AJAX */
$(document).on("click", "#checkoutBtn", function() {
  if (cart.length === 0) {
    $("#cartMessage").text("Your cart is empty.");
    return;
  }

  $("#cartMessage").text("Sending cart JSON to API service...");

  $.ajax({
    url: "https://jsonplaceholder.typicode.com/posts",
    type: "POST",
    contentType: "application/json",
    data: JSON.stringify(cart),
    success: function(response) {
      console.log("AJAX success:", response);
      $("#cartMessage").text("Checkout JSON sent successfully.");
    },
    error: function() {
      $("#cartMessage").text("Could not send data right now, but the JSON document is shown below.");
    }
  });
});

loadProducts();
renderCart();
</script>
</body>
</html>
